apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app04
  labels:
    app: todo-app04
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app04
  template:
    metadata:
      labels:
        app: todo-app04
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: todo-app04
          image: 183071452060.dkr.ecr.ap-northeast-2.amazonaws.com/todo-app04:7b5add6
          ports:
            - containerPort: 5000
